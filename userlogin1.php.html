<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
 
     .main-title 
     {
        font-size: 32px;
        font-weight: bold;
        color: #000;
        margin-bottom: 20px;
        text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
      }

    .login-container {
        background: #ffffff;
        padding: 30px 35px;
        width: 100%;
        max-width: 650px;
        border-radius: 12px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px 20px;
    }

    label {
        font-weight: bold;
        font-size: 14px;
        color: #444;
        grid-column: span 1;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
    }

    button {
        grid-column: span 2;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #00c6ff;
    }
    

    /* Mobile view */
    @media (max-width: 600px) {
        form {
            grid-template-columns: 1fr;
        }

        button {
            grid-column: span 1;
        }
    }
</style>

</head>
<body>	

    <h1 class="main-title">Automobile Replacement System</h1>
    <div class="login-container">
        <h2>Customer's Details</h2>
        <form action="save_customer.php" method="POST">
            <label for="username">CustomerId:</label>
            <input type="number" id="username" name="custId" placeholder="Enter Customer id" required>

            <label for="password">CustomerName:</label>
            <input type="text" id="cusname"  name="custName" placeholder="Enter Customer Name" required>
	    
	     <label for="Address1">CustomerAddress1:</label>
            <input type="text" id="ad1" name="addr1" placeholder="Enter Street Name" required>

	     <label for="address2">Address2:</label>
            <input type="text" id="ad2" name="addr2" placeholder="Enter Area Name" required>

	     <label for="address3">Address3:</label>
            <input type="text" id="ad3" name="addr3" placeholder="Enter City Name" required>

	    <label for="pin">PinCode:</label>
            <input type="number" id="pin" name="pincode" placeholder="Enter pincode" required>

	     <label for="Mobile">MobileNumber:</label>
            <input type="text" id="mn" name="mobile" placeholder="Enter Mobile Number" required>

	     <label for="email">Email Id:</label>
            <input type="email" id="Email" name="email" placeholder="Enter Email Address" required>

            <button type="submit" name="submit">Submit</button>
        </form>
    </div>

</body>
</html>
